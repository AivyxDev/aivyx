# ── CI Pipeline ───────────────────────────────────────────────────────
# Runs on every push to main and on pull requests.
# Uses the self-hosted runner on the Gitea VPS.
#
# The "check" job runs cargo build/test/clippy/fmt inside a Docker
# container because the bare VPS doesn't have gcc/libssl-dev.
#
# Jobs:
#   1. check  — cargo build, test, clippy, fmt (in Docker)
#   2. build  — Docker images for engine + website (main only)
#   3. deploy — Pull + restart containers on prod VPSes (main only)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint & Test (in Docker) ──────────────────────────────────────
  check:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build, test, lint
        run: |
          # Prepare SSH files for Docker with correct root permissions
          TMPDIR=$(mktemp -d)
          ssh-keyscan -p 2222 aivyx-gitea.cloud > "$TMPDIR/known_hosts" 2>/dev/null || true
          cp /home/aivyx/.ssh/id_ed25519 "$TMPDIR/id_ed25519"
          chmod 600 "$TMPDIR/id_ed25519"
          chmod 644 "$TMPDIR/known_hosts"

          docker run --rm \
            -v "$PWD":/build \
            -v "$TMPDIR/id_ed25519":/root/.ssh/id_ed25519:ro \
            -v "$TMPDIR/known_hosts":/root/.ssh/known_hosts:ro \
            -e CARGO_NET_GIT_FETCH_WITH_CLI=true \
            -w /build \
            rust:1.93-bookworm \
            bash -c '
              set -euo pipefail
              apt-get update -qq && apt-get install -y -qq \
                pkg-config libssl-dev libsqlite3-dev openssh-client git > /dev/null 2>&1

              # Clone aivyx-core as sibling for [patch] path dependencies
              echo "=== Clone aivyx-core ==="
              git clone --depth 1 ssh://git@aivyx-gitea.cloud:2222/AivyxDev/aivyx-core.git /aivyx-core 2>&1 | tail -2

              echo "=== Build ==="
              cargo build --workspace

              echo "=== Test ==="
              cargo test --workspace

              echo "=== Clippy ==="
              rustup component add clippy 2>/dev/null
              cargo clippy --workspace -- -D warnings

              echo "=== Format ==="
              rustup component add rustfmt 2>/dev/null
              cargo fmt --all -- --check

              echo "=== Audit ==="
              cargo install cargo-audit --quiet 2>/dev/null || true
              cargo audit

              echo "✓ All checks passed"
            '

          rm -rf "$TMPDIR"

  # ─── Build Docker Images (main only) ──────────────────────────────
  build:
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build Engine image
        run: |
          docker build --no-cache \
            -f deploy/engine/Dockerfile \
            -t aivyx-gitea.cloud/aivyxdev/aivyx-engine:latest \
            .
          echo "✓ Engine image built"

      - name: Build Website image
        run: |
          docker build \
            -f deploy/website/Dockerfile \
            -t aivyx-gitea.cloud/aivyxdev/aivyx-website:latest \
            .
          echo "✓ Website image built"

  # ─── Deploy to Production (main only) ─────────────────────────────
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Deploy Engine
        run: |
          docker save aivyx-gitea.cloud/aivyxdev/aivyx-engine:latest | \
            ssh -o ConnectTimeout=10 aivyx-engine "docker load"

          ssh -o ConnectTimeout=10 aivyx-engine '
            cd /home/aivyx
            docker compose up -d engine
            sleep 10
            echo "=== Engine Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "engine|NAMES"
          '
          echo "✓ Engine deployed"

      - name: Deploy Website
        run: |
          docker save aivyx-gitea.cloud/aivyxdev/aivyx-website:latest | \
            ssh -o ConnectTimeout=10 aivyx-studio "docker load"

          ssh -o ConnectTimeout=10 aivyx-studio '
            cd /home/aivyx
            docker compose up -d website
            sleep 10
            echo "=== Website Status ==="
            docker ps --format "table {{.Names}}\t{{.Status}}" | grep -E "website|NAMES"
          '
          echo "✓ Website deployed"
