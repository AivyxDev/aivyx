apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aivyx-engine.fullname" . }}
  labels:
    {{- include "aivyx-engine.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.secrets.bearerToken }}
  bearer-token: {{ .Values.secrets.bearerToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.secrets.masterKey }}
  master-key: {{ .Values.secrets.masterKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.postgresql.external.url }}
  database-url: {{ .Values.postgresql.external.url | b64enc | quote }}
  {{- end }}
