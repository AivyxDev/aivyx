# ─── VPS5 Autonomous Agents + Ops Dashboard ─────────────────────────
# Extends the base engine compose with VPS5-specific configuration.
# Usage: docker compose -f docker-compose.yml -f docker-compose.vps5.yml up -d

services:
  engine:
    environment:
      # Use Ollama as the LLM provider (local, no API key needed)
      AIVYX_API_KEY: "ollama"
    volumes:
      - ./aivyx-data:/home/aivyx/.aivyx
      # Mount agent profiles for first-boot provisioning
      - ./agents:/opt/aivyx-agents:ro

  # ─── Ops Dashboard ──────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: aivyx-dashboard
    restart: always
    environment:
      BEARER_TOKEN: "${DASHBOARD_BEARER_TOKEN:?Set DASHBOARD_BEARER_TOKEN}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`dashboard.ops.aivyx.ai`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=le"
      - "traefik.http.services.dashboard.loadbalancer.server.port=80"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost/nginx-health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    networks:
      - aivyx
