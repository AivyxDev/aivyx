services:
  # ─── Traefik Reverse Proxy & Auto-TLS ─────────────────────────────
  traefik:
    image: traefik:v3.6
    container_name: aivyx-traefik
    restart: always
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.le.acme.email=${ACME_EMAIL:?Set ACME_EMAIL}"
      - "--certificatesresolvers.le.acme.httpchallenge=true"
      - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json"
      - "--ping=true"
      - "--entrypoints.ping.address=:8082"
      - "--ping.entrypoint=ping"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8082/ping || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: &logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - aivyx

  # ─── PostgreSQL + pgvector ────────────────────────────────────────
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: aivyx-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD}"
      POSTGRES_DB: aivyx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d aivyx" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *logging
    networks:
      - aivyx

  # ─── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aivyx-redis
    restart: always
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD:?Set REDIS_PASSWORD}" ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep -q PONG" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    logging: *logging
    networks:
      - aivyx

  # ─── Ollama (Local LLM) ──────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: aivyx-ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: [ "CMD-SHELL", "ollama list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      OLLAMA_NUM_PARALLEL: "1"
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
    logging: *logging
    networks:
      - aivyx

  # ─── Aivyx Engine API ────────────────────────────────────────────
  engine:
    image: aivyx-gitea.cloud/aivyxdev/aivyx-engine:latest
    container_name: aivyx-engine
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.engine.rule=Host(`${ENGINE_DOMAIN:?Set ENGINE_DOMAIN}`)"
      - "traefik.http.routers.engine.entrypoints=websecure"
      - "traefik.http.routers.engine.tls.certresolver=le"
      - "traefik.http.services.engine.loadbalancer.server.port=8080"
    environment:
      RUST_LOG: info
      AIVYX_PASSPHRASE: "${AIVYX_PASSPHRASE:?Set AIVYX_PASSPHRASE}"
      AIVYX_API_KEY: "${AIVYX_API_KEY:-ollama}"
    volumes:
      - ./aivyx-data:/home/aivyx/.aivyx
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    stop_grace_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
    logging: *logging
    networks:
      - aivyx

volumes:
  letsencrypt:
  postgres_data:
  redis_data:
  ollama_data:


networks:
  aivyx:
    driver: bridge
