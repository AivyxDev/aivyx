# ─── Autonomous Agent Schedule Reference ───────────────────────────
#
# This file documents all scheduled missions for the autonomous agents
# deployed on VPS5. These are added to the engine via `aivyx schedule add`.
#
# Format: aivyx schedule add --name NAME --cron "EXPR" --agent AGENT --prompt "PROMPT"
#
# ─────────────────────────────────────────────────────────────────────

