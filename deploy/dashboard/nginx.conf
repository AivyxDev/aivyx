# ─── Nginx config for Aivyx Ops Dashboard ──────────────────────────
# Serves static files and proxies /api/* to the engine container.
# The Bearer token is injected server-side via environment variable
# so no credentials are exposed in the browser.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store";
    }

    # CSS/JS — no cache during active development
    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Proxy API requests to the engine container
    location /api/ {
        # Strip /api prefix and proxy to engine
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://aivyx-engine:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Inject Bearer token from environment (set in entrypoint)
        proxy_set_header Authorization "Bearer $BEARER_TOKEN";

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;

        # Timeout for long-running LLM calls
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
